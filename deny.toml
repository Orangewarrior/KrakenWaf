[advisories]
version = 2
ignore = [
    # rustls-pemfile v2.x is unmaintained (RUSTSEC-2025-0134); the upstream
    # recommendation is to migrate to rustls-pki-types built-in PEM parsing.
    # Tracked as a future refactor — no patched version exists yet.
    "RUSTSEC-2025-0134",
    # Marvin Attack timing side-channel in the rsa crate (RUSTSEC-2023-0071).
    # Pulled transitively through sqlx-mysql, which sqlx bundles unconditionally
    # even when sea-orm is configured with sqlx-sqlite only. We perform zero RSA
    # operations, so this path is never exercised. No fixed version available.
    "RUSTSEC-2023-0071",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "OpenSSL",
    "Zlib",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
