[advisories]
version = 2
ignore = [
    # rand 0.7.x transitive dep (pulled in by some crates) flagged as unsound
    # via RUSTSEC-2026-0097. We do not use rand directly; updating is blocked
    # on upstream crates. Safe to ignore until transitive deps update.
    "RUSTSEC-2026-0097",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "OpenSSL",
    "Zlib",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
