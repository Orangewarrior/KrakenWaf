[advisories]
version = 2
ignore = [
    # bincode 1.x is "unmaintained" per RUSTSEC-2025-0141, but the upstream
    # team explicitly considers v1.3.3 a complete release with no security
    # issues — they ceased development after a harassment incident. We rely
    # on bincode for serde-compatible binary encoding and the alternative
    # crates (postcard, bitcode, rkyv) are not API-compatible drop-ins.
    # No safe upgrade exists; tracking for future migration.
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.3.3 is feature-complete, no CVE; tracking migration to postcard/bitcode" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "OpenSSL",
    "Zlib",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
